name: shape
description: "Shape — a touch-native, cross-platform vector design application."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

# Shape deliberately depends ONLY on the Flutter SDK so the project builds and
# runs on any machine with Flutter installed — no network fetch of packages is
# required. The spec's recommended packages (riverpod, flutter_animate, etc.)
# can be layered in later; the architecture here mirrors them with built-ins:
#   * State        -> ChangeNotifier + InheritedNotifier (see lib/state)
#   * Springs      -> dart:physics SpringSimulation (see lib/theme/springs.dart)
#   * Frosted glass-> BackdropFilter (see lib/widgets/glass.dart)
#   * Haptics      -> services HapticFeedback
dependencies:
  flutter:
    sdk: flutter
  # Cross-platform key/value persistence (Android, iOS, web, desktop) for
  # saving projects, project history, and last-opened recovery.
  shared_preferences: ^2.3.2
  # Cross-platform image import (returns bytes on every platform incl. web).
  file_picker: ^8.1.2
  # Cross-platform file saving (web download + native save) for export.
  file_saver: ^0.2.14
  image: ^4.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # Bundled OFL typefaces — the Typography panel works fully offline (no network
  # fetch). Most are variable fonts; the weight axis is driven via FontVariation
  # in lib/theme/fonts.dart.
  fonts:
    - family: InstrumentSans
      fonts: [{asset: assets/fonts/InstrumentSans.ttf}]
    - family: Inter
      fonts: [{asset: assets/fonts/Inter.ttf}]
