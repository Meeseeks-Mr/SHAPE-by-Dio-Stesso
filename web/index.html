<!DOCTYPE html>
<html>
<head>
  <!--
    Replaced by the `--base-href` argument to `flutter build web`. GitHub Pages
    serves a project site from /<repo>/, so build with `--base-href /<repo>/`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Shape - a touch-native, cross-platform vector design application.">

  <!--
    user-scalable=no is load-bearing, not a preference: the canvas implements
    its own pinch-to-zoom. Without this the browser zooms the whole page on the
    same gesture and the editor becomes unusable on a phone.
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#F7F4FC">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Shape">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Shape</title>
  <link rel="manifest" href="manifest.json">

  <!--
    Social link preview (Open Graph + Twitter Card).

    og:image MUST be an absolute URL — scrapers do not resolve relative paths
    or honour <base>. __SITE_URL__ is rewritten to the real Pages URL by the
    deploy workflow, so a locally-built index.html leaves the token in place;
    that's expected and only affects previews, never the app.
  -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Shape">
  <meta property="og:title" content="Shape — vector design in your browser">
  <meta property="og:description" content="A touch-native vector design app. Pen and bezier editing, boolean ops, effects, and SVG export — on desktop and mobile, nothing to install.">
  <meta property="og:url" content="__SITE_URL__">
  <meta property="og:image" content="__SITE_URL__og-image.png">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="The Shape mark beside the wordmark: a mint rounded square overlapped by a periwinkle circle.">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Shape — vector design in your browser">
  <meta name="twitter:description" content="A touch-native vector design app. Pen and bezier editing, boolean ops, effects, and SVG export — on desktop and mobile, nothing to install.">
  <meta name="twitter:image" content="__SITE_URL__og-image.png">
  <meta name="twitter:image:alt" content="The Shape mark beside the wordmark.">
  <link rel="canonical" href="__SITE_URL__">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #F7F4FC;
    }
    body {
      /* Stop the browser claiming gestures the canvas needs: pull-to-refresh,
         overscroll bounce, long-press text selection and the iOS callout. */
      overscroll-behavior: none;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ---- Pre-engine backdrop --------------------------------------------
       Deliberately NOT a splash. Nothing Flutter-based can paint until the
       engine has downloaded, so *something* must fill the page — but the app's
       own animated splash (lib/screens/splash_screen.dart) is the one and only
       loading screen. This is just its background, so the splash appears to
       fade up on an already-present page rather than replacing a second
       loading screen. Do not add branding here: that is what produced two
       loading screens. */
    #boot {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 50% 44%, #FFFFFF 0%, rgba(255,255,255,0) 60%),
        linear-gradient(180deg, #F7F4FC 0%, #F4F0FB 55%, #EAF3F7 100%);
      transition: opacity 0.3s ease;
    }
    #boot.gone { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
  <div id="boot"></div>

  <script>
    // The app draws its own context menu on right-click / long-press.
    window.addEventListener('contextmenu', (e) => e.preventDefault());

    // The backdrop's only job is to hold the page's colour until Flutter paints
    // its splash, then get out of the way.
    window.addEventListener('flutter-first-frame', function () {
      var boot = document.getElementById('boot');
      if (!boot) return;
      boot.classList.add('gone');
      setTimeout(function () { boot.remove(); }, 400);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
